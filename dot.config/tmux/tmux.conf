#-----------------------------------------------------------------------------
# tmux show-options -g
# tmux list-keys
# tmux list-keys -Tcopy-mode-vi
#-----------------------------------------------------------------------------

## Basic Setting # {{{1

set-option -g default-shell /bin/zsh

## truecolor
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color-italic:Tc"

# set-option -g display-time 2000

set-option -g escape-time 10
set-option -g repeat-time 500

## define prefix-key
unbind-key C-Space
set-option -g prefix C-Space
bind-key C-Space send-prefix
unbind-key C-b

## change paste buffer
set-option -g buffer-limit 20

## change buffer log
set-option -g history-limit 100000

## message text
set-option -g message-style bg=colour0,fg=colour166,bright

## reload
unbind-key C-r
bind-key C-r source-file $HOME/.config/tmux/tmux.conf\; display-message "Reload Config!!"

## neovim
set-option -g focus-events on


## Copy Mode # {{{2

set-window-option -g mode-keys vi

unbind-key ^"["
bind-key ^"[" copy-mode
unbind-key ^y
bind-key ^y copy-mode
unbind-key ^]
bind-key  ^] paste-buffer

bind-key C-v run "pbpaste | tmux load-buffer - && tmux paste-buffer"

unbind-key -Tcopy-mode-vi Enter
unbind-key -Tcopy-mode-vi Space
unbind-key -Tcopy-mode-vi v
bind-key -Tcopy-mode-vi v send -X begin-selection
bind-key -Tcopy-mode-vi V send -X select-line
bind-key -Tcopy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind-key -Tcopy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"
bind-key -Tcopy-mode-vi Space send -X copy-pipe-and-cancel "pbcopy"
bind-key -Tcopy-mode-vi i send -X cancel

## Session # {{{2

unbind-key !
bind-key Space choose-tree -w

unbind-key S
bind-key S command-prompt -I "#S" { rename-session "%%" }

## Window Key Bindings # {{{2

unbind-key ^t
bind-key C-Space last-window

## rename window
unbind-key W
bind-key W command-prompt -I "#S" { rename-window "%%" }

## create new window
bind-key c new-window -c "#{PWD}"
bind-key C-n new-window -c "#{PWD}"

## kill window
unbind-key "\\"
unbind-key C-q
bind-key C-q confirm-before kill-window


## Pane Key Bindings # {{{2

## split windows like vim
bind-key C-s split-window -v -c "#{PWD}"
bind-key C-v split-window -h -c "#{PWD}"

## pane 移動
# https://qiita.com/izumin5210/items/d2e352de1e541ff97079
bind -n C-w switch-client -T NAVIGATOR

# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

# `bind-key -n` のかわりに `bind -T NAVIGATOR` にする
# `send-keys h` のかわりに `send-keys C-w h` にする
bind -T NAVIGATOR h if-shell "$is_vim" "send-keys C-w h"  "select-pane -L"
bind -T NAVIGATOR j if-shell "$is_vim" "send-keys C-w j"  "select-pane -D"
bind -T NAVIGATOR k if-shell "$is_vim" "send-keys C-w k"  "select-pane -U"
bind -T NAVIGATOR l if-shell "$is_vim" "send-keys C-w l"  "select-pane -R"
bind -T NAVIGATOR \ if-shell "$is_vim" "send-keys C-w \\" "select-pane -l"

# `C-w` が Tmux に喰われてしまうので，2回打つことで Vim に `C-w` を送れるようにして救う
# 使用頻度の高い Window command がある場合は、明示的に `bind -T NAVIGATOR <key> send-keys C-w <key>` すればいい
bind -T NAVIGATOR C-w send-keys C-w

## resize panes
bind-key -r H resize-pane -L 3
bind-key -r L resize-pane -R 3
bind-key -r J resize-pane -D 3
bind-key -r K resize-pane -U 3

## swap pane
bind-key > swap-pane -D
bind-key < swap-pane -U

## break pane
unbind-key C-o
bind-key C-o break-pane

## join-pane: the format is session:window.pane
bind-key f command-prompt -p "join pane from:" "join-pane -s '%%'"
bind-key t command-prompt -p "send pane to:"   "join-pane -t '%%'"

## kill pane
bind-key q kill-pane



# Pane Settings  # {{{1

## pane border and colors
set-option -g pane-border-style fg=colour8
set-option -g pane-active-border-style fg=colour15
set-option -g pane-border-lines double

## pane number display
set-option -g display-panes-active-colour colour64 #green
set-option -g display-panes-colour colour166 #orange



# Status Settings  # {{{1

set-option -g status-position bottom
set-option -g status on
set-option -g status-interval 1

## status bar color
set-option -g status-style 'fg=colour232,bg=colour244'

## current window status
set-window-option -g window-status-current-format ' #I:#W '
set-window-option -g window-status-current-style 'fg=colour250,bg=colour232,reverse'
set-window-option -g window-status-current-style 'fg=colour232,bg=colour250,reverse'
set-window-option -g window-status-format ' #I:#W '
set-window-option -g window-status-style 'fg=colour232'

## status left
set-option -g status-left-length 60
# set-option -g status-left '#[fg=colour248,bg=colour232]⣿ ❐ #h ⡇#[default]'
# set-option -g status-left '#[fg=colour232]⣿ ❐ #h ⡇#[default]'
set -g status-left "#[fg=colour250,bg=colour237,bold]⣿ #S:#I:#P "

## status right
set-option -g status-right-length 60
# set-option -g status-right '#[fg=colour248,bg=colour232]⡇#{selected_input_source}⡇%Y-%m-%d(%a) %H:%M'
set-option -g status-right '#[fg=colour232]⡇#{selected_input_source}⡇%Y-%m-%d(%a) %H:%M '



# Misc # {{{1

## clock
set-window-option -g clock-mode-colour colour64 #green

## man
bind-key / command-prompt "split-window -l 60% 'exec man %%'"

## quick memo
unbind-key m
bind-key m split-window -v -l 40% "memo new"

## quickly invoke any command
unbind-key a
bind-key a command-prompt -p "Enter command:" "split-window -l 30% '%% | less -R'"

## Open current directory
unbind-key o
bind-key o run-shell "open #{PWD}"


## tmux-file-picker
## https://github.com/raine/tmux-file-picker
## https://dev.classmethod.jp/articles/shuntaka-claude-code-tmux-personal-tips/#fnref-00c5-4
bind C-f display-popup -E -d "#{pane_current_path}" -w 90% -h 90% "tmux-file-picker -g"

## tmux-session-killer
## https://gist.github.com/oppara/2c5cdb25d24e31d7039e6ff99a72c526
bind C-k display-popup -E -w 90% -h 90% "tmux-session-killer"

## tcmux
## https://k1low.hatenablog.com/entry/2026/02/14/144858
bind-key C-w run-shell "tcmux lsw -A --color=always | fzf --ansi --layout reverse --tmux 80%,50% --color='pointer:24' | cut -d: -f 1 | xargs tmux select-window -t"

bind -r g run-shell '\
  dir="$(tmux display-message -p "#{pane_current_path}")"; \
  while [ "$dir" != "/" ]; do \
    if [ -d "$dir/.git" ]; then \
      tmux display-popup -E -w 80% -h 80% -d "$dir" -- "${SHELL:-bash}"; \
      exit 0; \
    fi; \
    dir="$(dirname "$dir")"; \
  done; \
  tmux display-message "No git repository found"; \
'

# Run Claude Code in a separate session
bind -r y run-shell '\
  SESSION="claude-$(echo #{pane_current_path} | md5sum | cut -c1-8)"; \
  tmux has-session -t "$SESSION" 2>/dev/null || \
  tmux new-session -d -s "$SESSION" -c "#{pane_current_path}" "claude"; \
  tmux display-popup -w80% -h80% -E "tmux attach-session -t $SESSION"'

# Run GitHub Copilot in a separate session
bind -r c run-shell '\
  SESSION="claude-$(echo #{pane_current_path} | md5sum | cut -c1-8)"; \
  tmux has-session -t "$SESSION" 2>/dev/null || \
  tmux new-session -d -s "$SESSION" -c "#{pane_current_path}" "copilot"; \
  tmux display-popup -w80% -h80% -E "tmux attach-session -t $SESSION"'

# Tmux Plugin Manager # {{{1
#-----------------------------------------------------------------------------
# git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm
#
# プラグインのインストール
# prefix + I
#-----------------------------------------------------------------------------

set-environment -g TMUX_PLUGIN_MANAGER_PATH "${HOME}/.config/tmux/plugins"

set-option -g @plugin 'tmux-plugins/tpm'
set-option -g @plugin 'oppara/tmux-osx-selected-input-source'

# load plugins
if-shell "[ -x ${TMUX_PLUGIN_MANAGER_PATH}/tpm/tpm ]" "run-shell ${TMUX_PLUGIN_MANAGER_PATH}/tpm/tpm"


